steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/storepulse:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/storepulse:latest'
      - '.'

  # 2. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/storepulse:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/storepulse:latest']

  # 3. Deploy to Cloud Run (asia-southeast1 = Singapore)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - storepulse
      - '--image=gcr.io/$PROJECT_ID/storepulse:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--set-secrets=DATABASE_URL=storepulse-db-url:latest,ADMIN_SECRET=storepulse-admin-secret:latest,GOOGLE_MAPS_API_KEY=storepulse-gmaps-key:latest'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/storepulse:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/storepulse:latest'

options:
  logging: CLOUD_LOGGING_ONLY
